name: CI

# Pipeline CI/CD (COARF): build/lint/test + SAST/SCA (CESEC). O job de banco
# aplica as migrations num Postgres real e exercita os triggers de auditoria.
on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: goldendata
          POSTGRES_PASSWORD: goldendata
          POSTGRES_DB: goldendata
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U goldendata"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install bandit pip-audit
      - name: Lint (ruff)
        run: ruff check backend/app
      - name: SAST (bandit)
        run: bandit -r backend/app -ll
        continue-on-error: true
      - name: SCA (pip-audit)
        run: pip-audit -r backend/requirements.txt
        continue-on-error: true
      - name: Testes (pytest)
        working-directory: backend
        run: python -m pytest
      - name: Aplicar migrations + seed (Postgres real)
        env:
          PGPASSWORD: goldendata
        run: |
          for f in db/migrations/*.sql db/seed/*.sql; do
            echo ">> $f"
            psql -h localhost -U goldendata -d goldendata -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Smoke test do esquema + auditoria
        env:
          PGPASSWORD: goldendata
        run: |
          psql -h localhost -U goldendata -d goldendata -v ON_ERROR_STOP=1 <<'SQL'
          -- a ferramenta semeada deve existir
          SELECT 1/count(*) FROM tool WHERE codigo_institucional = 'IA-2025-001';
          -- a trilha de auditoria registrou as inserções do seed
          SELECT 1/ (CASE WHEN count(*) > 0 THEN 1 ELSE 0 END) FROM audit_log;
          -- a cadeia de hashes está íntegra (nenhum prev_hash órfão)
          WITH chain AS (
            SELECT id, prev_hash, lag(hash) OVER (ORDER BY id) AS hash_anterior
            FROM audit_log
          )
          SELECT 1/(CASE WHEN count(*)=0 THEN 1 ELSE 0 END)
          FROM chain WHERE id > (SELECT min(id) FROM audit_log) AND prev_hash IS DISTINCT FROM hash_anterior;
          -- imutabilidade: UPDATE em audit_log deve falhar
          DO $$
          BEGIN
            BEGIN
              UPDATE audit_log SET acao='delete' WHERE id = (SELECT min(id) FROM audit_log);
              RAISE EXCEPTION 'FALHA: audit_log permitiu UPDATE';
            EXCEPTION WHEN others THEN
              RAISE NOTICE 'OK: audit_log é imutável (%).', SQLERRM;
            END;
          END $$;
          SQL

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar e checar tipos / build
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build
