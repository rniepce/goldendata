# Configuração nginx para servir a SPA goldendata com headers de segurança.
# Diretrizes CESEC/COARF: CSP, X-Frame-Options, X-Content-Type-Options, Referrer-Policy, HSTS.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Não expor a versão do nginx (hardening).
    server_tokens off;

    # ----- Headers de segurança HTTP (OWASP Secure Headers) -----
    # Clickjacking
    add_header X-Frame-Options "DENY" always;
    # MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Vazamento de referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissões de APIs do navegador
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS (efetivo quando servido sob HTTPS no TLS terminator/ingress)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Content Security Policy — restringe origens; conecta apenas a si e à API/SSO.
    # connect-src usa 'self' e wildcards para o backend/Keycloak; ajuste conforme o ambiente.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; connect-src 'self' http: https:; form-action 'self'" always;

    # ----- SPA: fallback para index.html -----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets versionados (hash no nome).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para o index (garante novas versões da SPA).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Health check simples.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
